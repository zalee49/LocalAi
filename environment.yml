name: localai
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  # Notebooks
  - jupyterlab
  - ipykernel
  - ipywidgets
  # Data / ML
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  # Computer vision
  - pillow
  - pip
  - pip:
    # PyTorch CPU build — works on both Windows and Mac without CUDA setup
    # After getting comfortable, Windows users with Nvidia GPU can reinstall with CUDA:
    #   pip install torch torchvision --index-url https://download.pytorch.org/whl/cu121
    - torch
    - torchvision
    - torchaudio
    - opencv-python
    # Ollama / LLM
    - requests
    - python-dotenv
    # Extras
    - tqdm
